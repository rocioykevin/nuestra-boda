<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Rocío & Kevin | Nos casamos</title>

  <link rel="stylesheet" href="style.css">
</head>

<body>

  <div class="estrellas"></div>

  <div class="pantalla-inicial">

    <div class="hero">

      <div class="luna"></div>

      <div class="castillo"></div>

      <div class="lechuza">
        <img
          src="https://images.unsplash.com/photo-1553264701-d138db4fd5d4?auto=format&fit=crop&w=700&q=80"
          alt="Lechuza">
      </div>

    </div>

    <div class="sobre" id="sobre">

      <div class="sello">
        R & K
      </div>

      <h2>Has recibido una invitación muy especial...</h2>

      <p>Haz clic para abrirla</p>

    </div>

  </div>

  <div class="invitacion" id="invitacion">

    <h1>¡Nos casamos!</h1>

    <h2>Rocío & Kevin</h2>

    <p class="fecha">
      3 de abril de 2027
    </p>

    <div id="contador"></div>

    <p class="mensaje">
      La magia nos encontró hace muchos años y ahora queremos compartir con vosotros el capítulo más bonito de nuestra historia.
    </p>

  </div>

  <script src="script.js"></script>

</body>
</html>
